apiVersion: v1
kind: Service
metadata:
  name: rental-backend
  namespace: default
spec:
  ports:
    - port: 5000
      targetPort: 5000
  selector:
    app: rental-backend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rental-backend
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rental-backend
  template:
    metadata:
      labels:
        app: rental-backend
    spec:
      containers:
        - name: backend
          image: rental-backend:latest # Build output tag reference
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: rental-config
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: rental-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rental-secrets
                  key: DB_PASSWORD
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: rental-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: rental-secrets
                  key: JWT_SECRET
          resources:
            limits:
              memory: 512Mi
              cpu: 500m
            requests:
              memory: 256Mi
              cpu: 200m
