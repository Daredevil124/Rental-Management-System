apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rental-ingress
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - http:
        paths:
          # API traffic routed to Express backend
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: rental-backend
                port:
                  number: 5000
          # Frontend client traffic routed to React frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rental-frontend
                port:
                  number: 80
